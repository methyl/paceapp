name = "paceapp"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[vars]
APP_URL = "https://paceapp-7mx.pages.dev/"
MAGIC_FROM = "auth@mail.lucjan.us"
MAGIC_FROM_NAME = "PaceApp"
MAGIC_TTL_SECONDS = "900"
SESSION_TTL_SECONDS = "2592000"
COOKIE_DOMAIN = ""
DEV_RETURN_MAGIC_LINK = "false"

[[d1_databases]]
binding = "DB"
database_name = "paceapp"
database_id = "5a4bd2b8-51f1-45f7-8cb6-dc5de0c00daa"
migrations_dir = "workers/migrations"

[[r2_buckets]]
binding = "FIT_BUCKET"
bucket_name = "paceapp-fit"

# send_email is Workers-only, so outgoing mail goes through a tiny companion
# Worker (workers/email) reached via this service binding.
[[services]]
binding = "EMAIL_SVC"
service = "paceapp-email"

# Settings save (zone edits) triggers the backfill sweep immediately via
# this in-cluster service binding, so users see recomputed tags in
# seconds instead of waiting up to 5 min for the cron.
[[services]]
binding = "META_BACKFILL_SVC"
service = "paceapp-meta-backfill"
