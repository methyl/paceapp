name = "paceapp-backfill"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Daily at 03:17 UTC — low enough traffic that there's no risk of
# stepping on an upload. Override locally with `wrangler triggers deploy`.
[triggers]
crons = ["17 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "paceapp"
database_id = "5a4bd2b8-51f1-45f7-8cb6-dc5de0c00daa"

[[r2_buckets]]
binding = "FIT_BUCKET"
bucket_name = "paceapp-fit"
